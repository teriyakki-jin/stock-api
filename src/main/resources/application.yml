spring:
  application:
    name: stock-api

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15432}/stockdb
    username: ${DB_USERNAME:stock}
    password: ${DB_PASSWORD:stock}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

jwt:
  secret: ${JWT_SECRET}                # 필수 환경변수 - .env.example 참고
  access-token-expire-ms: 1800000      # 30분
  refresh-token-expire-ms: 604800000   # 7일

supabase:
  url: ${SUPABASE_URL:https://tylxnldgwrqyvnyykflj.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:sb_publishable_V3edZpybkbLLVUN_Wd5kRQ_ylahowLV}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:placeholder}
  jwt-secret: ${SUPABASE_JWT_SECRET:placeholder}
  db:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://db.tylxnldgwrqyvnyykflj.supabase.co:5432/postgres}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD}              # 필수 — application-secrets.yml 참고

kis:
  base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
  app-key: ${KIS_APP_KEY:}
  app-secret: ${KIS_APP_SECRET:}
  account-no: ${KIS_ACCOUNT_NO:}        # 계좌번호 (8자리-2자리)
  mock: ${KIS_MOCK:true}                # true=모의투자 서버, false=실투자 서버

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.nh.stockapi: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: local
    import: "optional:classpath:application-secrets.yml"

  datasource:
    url: jdbc:postgresql://localhost:15432/stockdb
    username: stock
    password: stock

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

jwt:
  secret: bG9jYWwtZGV2LW9ubHktc2VjcmV0LWtleS1kb250LXVzZS1pbi1wcm9kdWN0aW9u  # local 전용

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true  # Hibernate DDL 먼저, data.sql 나중

  sql:
    init:
      mode: never  # 테스트는 각 테스트가 직접 데이터 세팅 (data.sql 불필요)

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seQ==  # test 전용
